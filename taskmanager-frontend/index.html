<!-- new styling --> 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskManager — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <h2>✅ TaskManager</h2>
    <p class="subtitle">Manage your tasks efficiently</p>

    <!-- Tab switcher -->
    <div class="tab-switcher">
      <button id="tabLogin" class="active" onclick="showLogin()">Login</button>
      <button id="tabRegister" onclick="showRegister()">Register</button>
    </div>

    <!-- Alert -->
    <div id="alert" class="alert"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Rishi Rathi" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" 
          placeholder="Min 8 chars, 1 uppercase, 1 number" required/>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="regRole">
          <option value="USER">User</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <div class="form-group" id="adminSecretField" style="display:none">
        <label>Admin Secret Key</label>
        <input type="password" id="regAdminSecret" placeholder="Enter admin secret"/>
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
