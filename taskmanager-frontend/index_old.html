<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>Task Manager</h1>

        <!-- Register Form -->
        <div class="card">
            <h2>Register</h2>

            <form id="registerForm">

                <input
                    type="text"
                    id="registerName"
                    placeholder="Enter Name"
                    required
                >

                <input
                    type="email"
                    id="registerEmail"
                    placeholder="Enter Email"
                    required
                >

                <input
                    type="password"
                    id="registerPassword"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit">
                    Register
                </button>

            </form>
        </div>

        <!-- Login Form -->
        <div class="card">
            <h2>Login</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Enter Email"
                    required
                >

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
